  <!-- BORDE EXTERIOR del tile -->
  <rect x="240" y="60" width="200" height="200" fill="none" stroke="#1a0d00" stroke-width="2" style="fill:none;stroke:rgb(26, 13, 0);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

