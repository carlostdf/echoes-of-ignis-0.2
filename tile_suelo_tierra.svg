  <path d="M 300 105 Q 318 135 308 160 Q 298 185 312 215" fill="none" stroke="#3d2006" stroke-width="1" stroke-linecap="round" clip-path="url(#tile-clip)" style="fill:none;stroke:rgb(61, 32, 6);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

