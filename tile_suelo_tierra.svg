  <line x1="360" y1="145" x2="400" y2="143" stroke="#3d2006" stroke-width="1" stroke-linecap="round" clip-path="url(#tile-clip)" style="fill:rgb(0, 0, 0);stroke:rgb(61, 32, 6);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
